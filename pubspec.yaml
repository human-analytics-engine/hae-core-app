name: hae_core_app
description: "Human Analytics Engine Core Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.1
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Uygulama ikonunu otomatik oluşturmak için bu paketi ekledik
  flutter_launcher_icons: ^0.13.1

# Uygulama ikonu ayarları
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # Logoyu ve diğer görselleri burada sisteme tanıttık
  assets:
    - assets/images/logo.png